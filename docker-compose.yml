services:
  # Application service
  app:
    build: .
    container_name: gaming-leaderboard-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_STORAGE=/app/data/leaderboard.sqlite
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - gaming-network

networks:
  gaming-network:
    driver: bridge
